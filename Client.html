<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiddleLands - v14.1 (Performance Fix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #1A202C; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        #homeScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; background-color: #0c0e14;}
        #homeScreen h1 { font-size: 3rem; margin-bottom: 2rem; }
        #startGameButton { padding: 1rem 2rem; font-size: 1.25rem; background-color: #16A34A; color: white; border: none; border-radius: 0.5rem; cursor: pointer; transition: background-color 0.3s; }
        #startGameButton:hover { background-color: #15803D; }

        #gameContainer { position: relative; width: 100vw; height: 100vh; background-color: #0c0e14; display: none; /* Nascosto inizialmente */ justify-content: center; align-items: center; }
        canvas#gameCanvas { cursor: grab; image-rendering: pixelated; image-rendering: crisp-edges; }
        canvas#gameCanvas:active { cursor: grabbing; }
        .ui-overlay { position: absolute; padding: 0.5rem 0.75rem; background-color: rgba(30, 41, 59, 0.85); border-radius: 0.375rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); font-size: 0.8rem; color: #CBD5E1; z-index: 10; pointer-events: auto; }
        
        #hoverInfoDisplay { top: 0.5rem; left: 0.5rem; min-width: 150px; }
        #playerIdentification { top: 3.5rem; left: 0.5rem; display: flex; flex-direction: column; gap: 0.3rem;}
        #playerIdentification input[type="color"] { width: 4rem; height: 1.8rem; padding:0.1rem; border: 1px solid #475569;}
        #playerIdentification button { padding: 0.2rem 0.4rem; font-size: 0.7rem;}

        #statsDisplay { top: 0.5rem; right: 0.5rem; text-align: right;}
        #statsDisplay p { margin-bottom: 0.1rem; }

        #troopCommitControls { bottom: 0.5rem; left: 0.5rem; display: flex; flex-direction: column; gap: 0.3rem; width: 220px;}
        #troopCommitControls label { font-size: 0.75rem; }
        #troopCommitControls input[type="range"] { width: 100%; margin-top: 0.2rem; }
        #commitTroopsValueDisplay { font-size: 0.75rem; color: #94A3B8; text-align: center; }
        
        #messageBox { position: fixed; top: 0.5rem; left: 50%; transform: translateX(-50%); background-color: #16A34A; color: white; padding: 0.4rem 0.8rem; border-radius: 0.375rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); z-index: 1000; display: none; font-size: 0.8rem; pointer-events: none; }
        #minimapContainer { position: absolute; bottom: 0.5rem; right: 0.5rem; border: 1px solid #475569; background-color: rgba(12, 14, 20, 0.7); border-radius: 0.25rem; padding: 0.2rem; z-index: 5; }
        canvas#minimapCanvas { display: block; border-radius: 0.1rem; }
        .player-name-label { position: absolute; color: white; background-color: rgba(0,0,0,0.5); padding: 1px 3px; font-size: 9px; border-radius: 2px; white-space: nowrap; transform: translate(-50%, -120%); pointer-events: none; z-index: 1; }
    </style>
</head>
<body>
    <div id="homeScreen">
        <h1>MiddleLands</h1>
        <button id="startGameButton">Avvia Partita</button>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="hoverInfoDisplay" class="ui-overlay">ID Cursore: <span id="hoverIdDisplay" class="font-semibold">N/A</span></div>
        <div id="playerIdentification" class="ui-overlay">
            <p>Mio ID: <span id="myPlayerIdDisplay" class="font-semibold">...</span></p>
            <div> <input type="color" id="playerColorPicker" value="#FF0000"> <button id="changeColorButton" class="bg-blue-600 hover:bg-blue-700 text-white rounded">Applica</button> </div>
            <p>Mia Capitale: <span id="playerCapitalDisplay" class="font-semibold">Nessuna</span></p>
        </div>
        <div id="statsDisplay" class="ui-overlay">
            <p>Produzione: <span id="troopIncomeDisplay" class="font-semibold">0</span> /int.</p>
            <p>Truppe Totali: <span id="totalTroopsDisplay" class="font-semibold">0</span></p>
        </div>
        <div id="troopCommitControls" class="ui-overlay">
            <label for="commitTroopsSlider">Truppe per Espansione (<span id="commitTroopsPercentageDisplay">50</span>%):</label>
            <input type="range" id="commitTroopsSlider" min="1" max="100" value="50" step="1">
            <div id="commitTroopsValueDisplay">(0 truppe)</div>
            <div class="text-xs text-slate-400 mt-1">(Doppio click per espandere)</div>
        </div>
        <div id="minimapContainer"> <canvas id="minimapCanvas"></canvas> </div>
        <div id="playerNameLabelsContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
    </div>
    <div id="messageBox">Messaggio!</div>

    <script>
        const homeScreenDiv = document.getElementById('homeScreen');
        const startGameButton = document.getElementById('startGameButton');
        const gameContainer = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playerNameLabelsContainer = document.getElementById('playerNameLabelsContainer');
        
        const GRID_WIDTH = 1350; 
        const GRID_HEIGHT = 810;
        const BASE_TILE_SIZE = 4; 

        let cameraX = 0; let cameraY = 0; let zoomLevel = 1.0;
        let minZoom = 0.1; 
        const MAX_ZOOM = 16.0; 
        const ZOOM_SENSITIVITY = 0.001;
        let effectiveTileSize = BASE_TILE_SIZE * zoomLevel;
        let isPanning = false; let lastPanX, lastPanY;

        // --- Ottimizzazione Rendering --- 
        const staticOffscreenCanvas = document.createElement('canvas');
        const staticOffscreenCtx = staticOffscreenCanvas.getContext('2d');
        const minimapOffscreenCanvas = document.createElement('canvas');
        const minimapOffscreenCtx = minimapOffscreenCanvas.getContext('2d');
        let staticMapNeedsRedraw = true;
        let minimapNeedsRedraw = true;

        function resizeCanvas() {
            canvas.width = gameContainer.clientWidth;
            canvas.height = gameContainer.clientHeight;

            staticOffscreenCanvas.width = GRID_WIDTH * BASE_TILE_SIZE;
            staticOffscreenCanvas.height = GRID_HEIGHT * BASE_TILE_SIZE;
            minimapOffscreenCanvas.width = minimapCanvas.width;
            minimapOffscreenCanvas.height = minimapCanvas.height;
            
            staticMapNeedsRedraw = true;
            minimapNeedsRedraw = true;

            const minZoomX = canvas.width / (GRID_WIDTH * BASE_TILE_SIZE);
            const minZoomY = canvas.height / (GRID_HEIGHT * BASE_TILE_SIZE);
            minZoom = Math.max(minZoomX, minZoomY);
            zoomLevel = Math.max(minZoom, zoomLevel);

            drawGame(); 
        }
        
        const minimapCanvas = document.getElementById('minimapCanvas');
        const minimapCtx = minimapCanvas.getContext('2d');
        const MINIMAP_TILE_SCALE = 0.2;
        minimapCanvas.width = GRID_WIDTH * MINIMAP_TILE_SCALE;
        minimapCanvas.height = GRID_HEIGHT * MINIMAP_TILE_SCALE;

        let gameGrid = []; let myPlayerId = null; let myPlayerCapital = null; 
        let players = {}; 

        const hoverIdDisplay = document.getElementById('hoverIdDisplay'); 
        const myPlayerIdDisplay = document.getElementById('myPlayerIdDisplay'); 
        const playerColorPicker = document.getElementById('playerColorPicker');
        const changeColorButton = document.getElementById('changeColorButton');
        const playerCapitalDisplay = document.getElementById('playerCapitalDisplay');
        const troopIncomeDisplay = document.getElementById('troopIncomeDisplay');
        const totalTroopsDisplay = document.getElementById('totalTroopsDisplay');
        const commitTroopsSlider = document.getElementById('commitTroopsSlider'); 
        const commitTroopsPercentageDisplay = document.getElementById('commitTroopsPercentageDisplay');
        const commitTroopsValueDisplay = document.getElementById('commitTroopsValueDisplay');
        const messageBox = document.getElementById('messageBox');

        function showMessage(text, duration = 2500, isError = false) { 
            messageBox.textContent = text;
            messageBox.style.backgroundColor = isError ? '#DC2626' : '#16A34A'; 
            messageBox.style.display = 'block';
            setTimeout(() => { messageBox.style.display = 'none'; }, duration);
        }
        const socket = io('http://localhost:3000', { reconnectionAttempts: 5, reconnectionDelay: 1000 });
        
        startGameButton.addEventListener('click', () => { socket.emit('requestStartGame'); });

        socket.on('lobbyState', () => {
            homeScreenDiv.style.display = 'flex';
            gameContainer.style.display = 'none';
            showMessage("In attesa di avviare la partita...", 5000);
        });

        socket.on('gameStarted', () => {
            homeScreenDiv.style.display = 'none';
            gameContainer.style.display = 'flex';
            resizeCanvas(); 
            showMessage("Partita Iniziata!", 2000);
        });
        
        socket.on('connect', () => { console.log('Connesso al server con ID:', socket.id); });
        
        socket.on('assignPlayerDetails', (details) => { 
            if (!details || !details.id) return;
            players[details.id] = { ...players[details.id], id: details.id, color: details.color, capital: details.capital, isBot: details.isBot };
            if (details.id === socket.id) {
                myPlayerId = details.id;
                myPlayerIdDisplay.textContent = details.id.substring(0,5); 
                playerColorPicker.value = details.color;
                myPlayerCapital = details.capital;
                playerCapitalDisplay.textContent = myPlayerCapital ? `(${myPlayerCapital.x}, ${myPlayerCapital.y})` : 'Nessuna';
            }
            minimapNeedsRedraw = true;
            drawGame(); 
        });

        socket.on('updatePlayerStats', (stats) => { 
            if (stats.troops !== undefined) {
                totalTroopsDisplay.textContent = stats.troops;
                updateCommitTroopsDisplay(); 
            }
            if (stats.troopsPerInterval !== undefined) troopIncomeDisplay.textContent = stats.troopsPerInterval;
        });

        socket.on('updateGrid', (newGrid) => { 
            const isFirstLoad = gameGrid.length === 0;
            gameGrid = newGrid; 
            if (isFirstLoad) { staticMapNeedsRedraw = true; }
            minimapNeedsRedraw = true;
            drawGame(); 
        });
        
        socket.on('playerColorUpdated', (data) => { 
            if (players[data.playerId]) { players[data.playerId].color = data.newColor; }
            if (data.playerId === myPlayerId) {
                playerColorPicker.value = data.newColor;
                showMessage('Colore aggiornato!');
            }
            minimapNeedsRedraw = true;
            drawGame(); 
        });
        
        socket.on('errorOccurred', (errorMessage) => { 
            console.error('Errore dal server:', errorMessage);
            showMessage(`Errore: ${errorMessage}`, 3000, true);
        });

        // --- Funzioni di Rendering Ottimizzate ---

        function drawStaticMapOffscreen() {
            if (!gameGrid || gameGrid.length === 0) return;
            console.log("Redrawing static map background...");
            staticOffscreenCtx.imageSmoothingEnabled = false;
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const cell = gameGrid[y]?.[x];
                    if (cell) {
                        staticOffscreenCtx.fillStyle = cell.baseColor;
                        staticOffscreenCtx.fillRect(x * BASE_TILE_SIZE, y * BASE_TILE_SIZE, BASE_TILE_SIZE, BASE_TILE_SIZE);
                    }
                }
            }
        }

        function redrawMinimapOffscreen() {
            if (!gameGrid || gameGrid.length === 0) return;
            console.log("Redrawing minimap background...");
            minimapOffscreenCtx.imageSmoothingEnabled = false;
            minimapOffscreenCtx.fillStyle = '#0c0e14';
            minimapOffscreenCtx.fillRect(0, 0, minimapOffscreenCanvas.width, minimapOffscreenCanvas.height);
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const cell = gameGrid[y]?.[x];
                    if (cell) {
                        minimapOffscreenCtx.fillStyle = cell.owner && players[cell.owner] ? players[cell.owner].color : cell.baseColor;
                        minimapOffscreenCtx.fillRect(x * MINIMAP_TILE_SCALE, y * MINIMAP_TILE_SCALE, MINIMAP_TILE_SCALE, MINIMAP_TILE_SCALE);
                    }
                }
            }
        }

        function drawGame() { 
            if (!ctx || !minimapCtx) return;

            effectiveTileSize = BASE_TILE_SIZE * zoomLevel;
            const mapRenderWidth = GRID_WIDTH * effectiveTileSize;
            const mapRenderHeight = GRID_HEIGHT * effectiveTileSize;

            if (mapRenderWidth <= canvas.width) { cameraX = -(canvas.width - mapRenderWidth) / 2; } 
            else { cameraX = Math.max(0, Math.min(cameraX, mapRenderWidth - canvas.width)); }
            if (mapRenderHeight <= canvas.height) { cameraY = -(canvas.height - mapRenderHeight) / 2; } 
            else { cameraY = Math.max(0, Math.min(cameraY, mapRenderHeight - canvas.height)); }

            if (staticMapNeedsRedraw) {
                drawStaticMapOffscreen();
                staticMapNeedsRedraw = false;
            }

            ctx.fillStyle = '#0c0e14'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(staticOffscreenCanvas, cameraX / zoomLevel, cameraY / zoomLevel, canvas.width / zoomLevel, canvas.height / zoomLevel, 0, 0, canvas.width, canvas.height);

            drawDynamicElements();
            drawMinimap();
            drawPlayerNameLabels();
        }
        
        function drawDynamicElements() { 
            if (!gameGrid || gameGrid.length === 0) return;

            const startCol = Math.floor(cameraX / effectiveTileSize);
            const endCol = Math.min(GRID_WIDTH, Math.ceil((cameraX + canvas.width) / effectiveTileSize) + 1); 
            const startRow = Math.floor(cameraY / effectiveTileSize);
            const endRow = Math.min(GRID_HEIGHT, Math.ceil((cameraY + canvas.height) / effectiveTileSize) + 1); 

            const BORDER_COLOR = 'rgba(0,0,0,0.4)';
            const BORDER_THICKNESS = Math.max(1, Math.floor(effectiveTileSize * 0.15));

            for (let y = startRow; y < endRow; y++) {
                for (let x = startCol; x < endCol; x++) {
                    if (y < 0 || y >= GRID_HEIGHT || x < 0 || x >= GRID_WIDTH) continue; 
                    const cell = gameGrid[y]?.[x];
                    if (cell && cell.owner) { 
                        ctx.fillStyle = players[cell.owner] ? players[cell.owner].color : cell.color;
                        ctx.fillRect(Math.floor(x * effectiveTileSize - cameraX), Math.floor(y * effectiveTileSize - cameraY), Math.ceil(effectiveTileSize), Math.ceil(effectiveTileSize));
                        
                        if (effectiveTileSize > 3) {
                            ctx.fillStyle = BORDER_COLOR;
                            const screenX_rect = Math.floor(x * effectiveTileSize - cameraX);
                            const screenY_rect = Math.floor(y * effectiveTileSize - cameraY);
                            const tileDisplaySize_rect = Math.ceil(effectiveTileSize);

                            if (y === 0 || gameGrid[y-1]?.[x]?.owner !== cell.owner) ctx.fillRect(screenX_rect, screenY_rect, tileDisplaySize_rect, BORDER_THICKNESS);
                            if (y === GRID_HEIGHT - 1 || gameGrid[y+1]?.[x]?.owner !== cell.owner) ctx.fillRect(screenX_rect, screenY_rect + tileDisplaySize_rect - BORDER_THICKNESS, tileDisplaySize_rect, BORDER_THICKNESS);
                            if (x === 0 || gameGrid[y]?.[x-1]?.owner !== cell.owner) ctx.fillRect(screenX_rect, screenY_rect, BORDER_THICKNESS, tileDisplaySize_rect);
                            if (x === GRID_WIDTH - 1 || gameGrid[y]?.[x+1]?.owner !== cell.owner) ctx.fillRect(screenX_rect + tileDisplaySize_rect - BORDER_THICKNESS, screenY_rect, BORDER_THICKNESS, tileDisplaySize_rect);
                        }

                        const ownerDetails = players[cell.owner];
                        if (ownerDetails && ownerDetails.capital && x === ownerDetails.capital.x && y === ownerDetails.capital.y) {
                            ctx.fillStyle = cell.owner === myPlayerId ? 'rgba(255, 255, 255, 0.9)' : 'rgba(0, 0, 0, 0.7)'; 
                            const capitalMarkerSize = Math.max(2, effectiveTileSize / 2.5);
                            ctx.beginPath();
                            ctx.arc(Math.floor(x * effectiveTileSize - cameraX + effectiveTileSize / 2), Math.floor(y * effectiveTileSize - cameraY + effectiveTileSize / 2), capitalMarkerSize, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
            }
        }

        function drawPlayerNameLabels() { 
            playerNameLabelsContainer.innerHTML = ''; 
            if (zoomLevel < 0.5) return;
            for (const playerId in players) {
                const player = players[playerId];
                if (player.capital) {
                    const capX = player.capital.x; const capY = player.capital.y;
                    const screenX = capX * effectiveTileSize - cameraX + effectiveTileSize / 2;
                    const screenY = capY * effectiveTileSize - cameraY; 
                    if (screenX > -50 && screenX < canvas.width + 50 && screenY > -20 && screenY < canvas.height + 20) {
                        const label = document.createElement('div');
                        label.className = 'player-name-label';
                        label.style.left = `${screenX}px`; label.style.top = `${screenY}px`;
                        label.textContent = player.isBot ? player.id.split('_')[1] : (player.id ? player.id.substring(0,5) : '??'); 
                        label.style.color = player.color; 
                        playerNameLabelsContainer.appendChild(label);
                    }
                }
            }
        }

        function drawMinimap() { 
            if (minimapNeedsRedraw) {
                redrawMinimapOffscreen();
                minimapNeedsRedraw = false;
            }
            minimapCtx.imageSmoothingEnabled = false;
            minimapCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            minimapCtx.drawImage(minimapOffscreenCanvas, 0, 0);

            if (myPlayerId && players[myPlayerId]) { 
                 minimapCtx.strokeStyle = players[myPlayerId].color; 
                 minimapCtx.lineWidth = 2;
                 const viewportX = (cameraX / effectiveTileSize) * MINIMAP_TILE_SCALE;
                 const viewportY = (cameraY / effectiveTileSize) * MINIMAP_TILE_SCALE;
                 const viewportWidth = (canvas.width / effectiveTileSize) * MINIMAP_TILE_SCALE;
                 const viewportHeight = (canvas.height / effectiveTileSize) * MINIMAP_TILE_SCALE;
                 minimapCtx.strokeRect(viewportX, viewportY, viewportWidth, viewportHeight);
            }
        }
        
        let clickTimeout = null; 
        canvas.addEventListener('mousedown', (event) => { if (event.button === 0) { isPanning = true; lastPanX = event.clientX; lastPanY = event.clientY; canvas.style.cursor = 'grabbing';}});
        canvas.addEventListener('mouseup', (event) => { if (event.button === 0) { isPanning = false; canvas.style.cursor = 'grab';}});
        canvas.addEventListener('mouseleave', () => { if(isPanning) {isPanning = false; canvas.style.cursor = 'grab';}});
        
        canvas.addEventListener('mousemove', (event) => { 
             if (isPanning) {
                const dx = event.clientX - lastPanX; const dy = event.clientY - lastPanY;
                cameraX -= dx; cameraY -= dy;
                lastPanX = event.clientX; lastPanY = event.clientY;
                requestAnimationFrame(drawGame); 
            } else {
                 const worldCoords = screenToWorldCoords(event.clientX, event.clientY);
                if (worldCoords && gameGrid.length > 0) {
                    const tileX = Math.floor(worldCoords.x / (BASE_TILE_SIZE * zoomLevel));
                    const tileY = Math.floor(worldCoords.y / (BASE_TILE_SIZE * zoomLevel));
                    if (tileX >= 0 && tileX < GRID_WIDTH && tileY >= 0 && tileY < GRID_HEIGHT) {
                        const cell = gameGrid[tileY]?.[tileX];
                        if (cell && cell.owner) {
                            const ownerDetails = players[cell.owner];
                            if (ownerDetails) {
                                hoverIdDisplay.textContent = ownerDetails.isBot ? ownerDetails.id.split('_')[1] : (ownerDetails.id ? ownerDetails.id.substring(0,5) : '??');
                                hoverIdDisplay.style.color = ownerDetails.color;
                            } else { hoverIdDisplay.textContent = 'N/A'; hoverIdDisplay.style.color = ''; }
                        } else { hoverIdDisplay.textContent = 'N/A'; hoverIdDisplay.style.color = ''; }
                    } else { hoverIdDisplay.textContent = 'N/A'; hoverIdDisplay.style.color = ''; }
                } else { hoverIdDisplay.textContent = 'N/A'; hoverIdDisplay.style.color = ''; }
            }
        });

        canvas.addEventListener('click', (event) => { 
            if (!myPlayerId) return showMessage('Non connesso.', 2000, true);
            if (Math.hypot(event.clientX - lastPanX, event.clientY - lastPanY) > 5 && isPanning) return; 
            if (clickTimeout !== null) { 
                clearTimeout(clickTimeout); clickTimeout = null;
                if (myPlayerCapital) {
                    const percentage = parseInt(commitTroopsSlider.value, 10);
                    const totalPlayerTroops = parseInt(totalTroopsDisplay.textContent) || 0;
                    const troopsCommitted = Math.floor((percentage / 100) * totalPlayerTroops);
                    if (isNaN(troopsCommitted) || troopsCommitted <= 0) return showMessage('Seleziona truppe valide.', 2000, true);
                    if (troopsCommitted > totalPlayerTroops) return showMessage('Non hai abbastanza truppe.', 2000, true);

                    socket.emit('startCircularExpansion', { troopsCommitted });
                } else { showMessage('Fonda prima una capitale.', 2000, true); }
            } else {
                clickTimeout = setTimeout(() => {
                    clickTimeout = null; 
                    if (!myPlayerCapital) {
                        const worldCoords = screenToWorldCoords(event.clientX, event.clientY);
                        if(worldCoords){ 
                            const tileX = Math.floor(worldCoords.x / effectiveTileSize);
                            const tileY = Math.floor(worldCoords.y / effectiveTileSize);
                            if (tileX >= 0 && tileX < GRID_WIDTH && tileY >= 0 && tileY < GRID_HEIGHT) {
                                socket.emit('claimFirstTile', { x: tileX, y: tileY });
                            }
                        }
                    }
                }, 200); 
            }
        });

        canvas.addEventListener('wheel', (event) => { 
            event.preventDefault(); 
            const rect = canvas.getBoundingClientRect();
            const mousePos = { x: event.clientX - rect.left, y: event.clientY - rect.top };
            const worldXBeforeZoom = (cameraX + mousePos.x) / zoomLevel;
            const worldYBeforeZoom = (cameraY + mousePos.y) / zoomLevel;
            
            zoomLevel -= event.deltaY * ZOOM_SENSITIVITY;
            zoomLevel = Math.max(minZoom, Math.min(MAX_ZOOM, zoomLevel));

            cameraX = worldXBeforeZoom * zoomLevel - mousePos.x;
            cameraY = worldYBeforeZoom * zoomLevel - mousePos.y;
            requestAnimationFrame(drawGame);
        });

        function screenToWorldCoords(screenX, screenY) { 
            const rect = canvas.getBoundingClientRect();
             if (screenX < rect.left || screenX > rect.right || screenY < rect.top || screenY > rect.bottom) return null; 
            const canvasX = screenX - rect.left;
            const canvasY = screenY - rect.top;
            return { x: cameraX + canvasX, y: cameraY + canvasY };
        }

        changeColorButton.addEventListener('click', () => { 
             if (!myPlayerId) return showMessage('Non connesso.', 2000, true);
            socket.emit('changePlayerColor', { newColor: playerColorPicker.value });
        });
        
        function updateCommitTroopsDisplay() {
            const percentage = parseInt(commitTroopsSlider.value, 10);
            const totalPlayerTroops = parseInt(totalTroopsDisplay.textContent) || 0;
            const actualTroops = Math.floor((percentage / 100) * totalPlayerTroops);
            commitTroopsPercentageDisplay.textContent = percentage;
            commitTroopsValueDisplay.textContent = `(${actualTroops} truppe)`;
        }
        commitTroopsSlider.addEventListener('input', updateCommitTroopsDisplay);
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); 
        updateCommitTroopsDisplay(); 

        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');
        if(chatInput) {
            chatInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' && chatInput.value.trim()) {
                    socket.emit('sendMessage', chatInput.value);
                    chatInput.value = '';
                    event.target.blur();
                }
            });
        }
        if(socket) {
            socket.on('newMessage', (data) => {
                if (chatMessages) {
                    const messageElement = document.createElement('p');
                    messageElement.style.marginBottom = '3px';
                    messageElement.innerHTML = `<span style="color: ${data.color}; font-weight: bold;">${data.sender}:</span> ${data.message}`;
                    chatMessages.appendChild(messageElement);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            });
        }
    </script>
</body>
</html>
